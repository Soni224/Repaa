<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 flex flex-col items-center justify-center min-h-screen">

    <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold mb-6">Mini App Panel</h1>
        
        <div class="grid grid-cols-1 gap-4">
            <button onclick="sendAction('Настройка 1')" class="glass py-4 rounded-xl active:scale-95 transition-all">⚙️ Настройка 1</button>
            <button onclick="sendAction('Баланс')" class="glass py-4 rounded-xl active:scale-95 transition-all">💰 Баланс</button>
            <button onclick="sendAction('Помощь')" class="glass py-4 rounded-xl active:scale-95 transition-all">❓ Помощь</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЯ ССЫЛКА ИЗ CODESPACES (без слэша в конце!)
        const BACKEND_URL = "https://improved-halibut-q7pg7xp5j7xg29xqq-8000.app.github.dev";

        async function sendAction(name) {
            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) {
                alert("Ошибка: Запустите через Telegram!");
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, action: name })
                });
                
                const result = await response.json();
                if(result.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) {
                console.error(e);
                alert("Сервер недоступен!");
            }
        }
    </script>
</body>
</html>
