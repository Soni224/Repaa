<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    .card { max-width: 420px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; }
    input, button { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
    button { background: #2ea6ff; color: white; border: 0; border-radius: 10px; cursor: pointer; }
    button:active { background: #1a8ccd; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Профиль</h2>
    <div id="userInfo"></div>

    <input id="name" type="text" placeholder="Имя">
    <input id="email" type="email" placeholder="Email">
    <button id="saveBtn">Сохранить</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Развернуть приложение на всё окно

    const user = tg.initDataUnsafe?.user;
    const userInfo = document.getElementById("userInfo");

    if (user) {
      userInfo.innerHTML = `
        <p><b>${user.first_name}</b> (@${user.username || "no_username"})</p>
      `;
    } else {
      userInfo.innerHTML = "<p>Пользователь не найден</p>";
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value
      };
      
      // Метод sendData работает только если Mini App открыт через Keyboard Button
      tg.sendData(JSON.stringify(payload));
      tg.close();
    });
  </script>
</body>
</html>
