    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;

        // ==========================================================
        // 📍 ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ ИЗ CODESPACES
        // Метод .replace() автоматически удаляет слеш на конце, 
        // если вы случайно его скопируете. Это спасет от ошибки //api/action
        // ==========================================================
        const CODESPACES_BACKEND_URL = "https://improved-halibut-q7pg7xp5j7xg29xqq-8000.app.github.dev/".replace(/\/+$/, '');
        // ==========================================================

        /**
         * МЕТОД 1: tg.sendData()
         * Отправляет данные боту и МГНОВЕННО ЗАКРЫВАЕТ Mini App.
         */
        function sendInstantAction(actionType) {
            if (!user) return tg.showPopup({ title: "Ошибка", message: "Данные пользователя недоступны." });
            
            const payload = JSON.stringify({
                user_id: user.id,
                action_type: actionType
            });

            tg.sendData(payload);
        }

        /**
         * МЕТОД 2: Async Fetch (Background)
         * Отправляет запрос в бэкенд. Приложение остается открытым.
         */
        async function sendBackgroundAction(actionType) {
            if (!user) return tg.showPopup({ title: "Ошибка", message: "Данные пользователя недоступны." });

            // Теперь URL собирается идеально: https://...app.github.dev/api/action
            try {
                const response = await fetch(`${CODESPACES_BACKEND_URL}/api/action`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: user.id,
                        action_type: actionType
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    tg.showPopup({
                        title: "Успешно ✨",
                        message: "Проверьте чат Telegram — сообщение отправлено!",
                        buttons: [{ type: "ok" }]
                    });
                } else {
                    throw new Error(result.message || "Server error");
                }
            } catch (error) {
                tg.showPopup({
                    title: "Ошибка сети ❌",
                    message: "Не удалось связаться с бэкендом. Проверьте, запущен ли Codespace и открыт ли порт.",
                    buttons: [{ type: "ok" }]
                });
            }
        }
    </script>
