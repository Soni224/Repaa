<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>

    <!-- Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #07070e;
            --fg: #eaeaf2;
            --muted: #6e6e85;
            --accent: #00e5ff;
            --accent-2: #ff1a6d;
            --card: rgba(255, 255, 255, 0.035);
            --card-border: rgba(255, 255, 255, 0.065);
            --glass-blur: 22px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }
        .orb-1 { width: 360px; height: 360px; background: var(--accent); top: -120px; left: -100px; animation: drift1 14s ease-in-out infinite; }
        .orb-2 { width: 320px; height: 320px; background: var(--accent-2); bottom: -100px; right: -80px; animation: drift2 17s ease-in-out infinite; }
        .orb-3 { width: 260px; height: 260px; background: #8b5cf6; top: 45%; left: 55%; animation: drift3 20s ease-in-out infinite; }

        @keyframes drift1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(70px, 90px) scale(1.12); } 66% { transform: translate(-35px, 50px) scale(0.92); } }
        @keyframes drift2 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-55px, -70px) scale(1.15); } 66% { transform: translate(45px, -35px) scale(0.93); } }
        @keyframes drift3 { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-35%, -65%) scale(1.18); } }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 20px 18px;
            cursor: pointer;
            transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.38s ease, box-shadow 0.38s ease;
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.1) 50%, transparent 95%);
        }
        .glass-card:hover {
            transform: translateY(-5px) scale(1.025);
            border-color: var(--card-hover-border, rgba(0, 229, 255, 0.28));
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.07), 0 0 0 1px rgba(0, 229, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }
        .glass-card:active { transform: translateY(0) scale(0.97); transition-duration: 0.1s; }
        .glass-card--static { cursor: default; }
        .glass-card--static:hover { transform: none; border-color: var(--card-border); box-shadow: none; }

        .card-icon {
            width: 46px; height: 46px;
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px;
            transition: transform 0.38s ease, box-shadow 0.38s ease;
        }
        .card-icon svg { width: 22px; height: 22px; }
        .glass-card:hover .card-icon {
            transform: scale(1.12);
            box-shadow: 0 0 22px var(--icon-glow, rgba(0,229,255,0.25));
        }

        /* Toggle Switch */
        .toggle-track {
            width: 50px; height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }
        .toggle-track.active {
            background: rgba(0, 229, 255, 0.25);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
        }
        .toggle-thumb {
            width: 22px; height: 22px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toggle-track.active .toggle-thumb {
            transform: translateX(22px);
            background: var(--accent);
        }

        .action-btn {
            background: linear-gradient(135deg, rgba(255,26,109,0.15), rgba(255,26,109,0.05));
            border: 1px solid rgba(255,26,109,0.3);
            color: var(--accent-2);
            padding: 14px 24px;
            border-radius: 13px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600; font-size: 14px;
            cursor: pointer; width: 100%;
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            background: linear-gradient(135deg, rgba(255,26,109,0.25), rgba(255,26,109,0.1));
            box-shadow: 0 0 20px rgba(255,26,109,0.15);
        }
        .action-btn:active { transform: scale(0.97); }

        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .toast {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: rgba(0, 229, 255, 0.12); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.25); color: var(--accent);
            padding: 10px 22px; border-radius: 11px; font-size: 12px; font-weight: 500;
            opacity: 0; transition: all 0.32s ease; z-index: 200; pointer-events: none;
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .dev-notice { background: rgba(255, 26, 109, 0.08); border: 1px solid rgba(255, 26, 109, 0.22); color: var(--accent-2); padding: 11px 16px; border-radius: 12px; font-size: 11px; text-align: center; }
        .accent-line { height: 2px; width: 48px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); margin-top: 10px; }
        
        .sub-content { padding: 20px 18px; background: var(--card); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur)); border: 1px solid var(--card-border); border-radius: 18px; }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

        @media (prefers-reduced-motion: reduce) {
            .orb, .toggle-thumb { animation: none !important; transition: none !important; }
            .glass-card, .card-icon, .action-btn, .toggle-track { transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <main id="app" class="relative z-10 min-h-screen min-h-[100dvh] px-4 pt-6 pb-28 max-w-md mx-auto">
        <!-- Контент рендерится через JS -->
    </main>

    <div id="toast" class="toast" role="alert"></div>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp;
        const isTelegram = !!tg;
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');
        
        // Получаем начальное состояние переключателя из URL
        const initialNotifState = urlParams.get('notif') === 'True';

        // Данные карточек
        const cards = [
            { id: 'profile', title: 'Profile', desc: 'Manage identity', color: '#00e5ff', bg: 'rgba(0,229,255,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
            { id: 'settings', title: 'Settings', desc: 'Customize app', color: '#a78bfa', bg: 'rgba(167,139,250,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>' },
            { id: 'wallet', title: 'Wallet', desc: 'Balance & funds', color: '#34d399', bg: 'rgba(52,211,153,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>' },
            { id: 'analytics', title: 'Analytics', desc: 'Track activity', color: '#fbbf24', bg: 'rgba(251,191,36,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="6" width="4" height="15" rx="1"/><rect x="17" y="2" width="4" height="19" rx="1"/></svg>' },
            { id: 'notifications', title: 'Alerts', desc: 'Stay updated', color: '#f97316', bg: 'rgba(249,115,22,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>' },
            { id: 'security', title: 'Security', desc: 'Privacy & guard', color: '#ff1a6d', bg: 'rgba(255,26,109,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
            { id: 'referrals', title: 'Referrals', desc: 'Invite friends', color: '#38bdf8', bg: 'rgba(56,189,248,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
            { id: 'premium', title: 'Premium', desc: 'Unlock power', color: '#facc15', bg: 'rgba(250,204,21,0.1)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' }
        ];

        // Состояние приложения
        let appState = {
            currentPage: 'home',
            notifications: initialNotifState
        };

        function init() {
            if (isTelegram) {
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#07070e');
                tg.setBackgroundColor('#07070e');
                tg.MainButton.text = 'Close';
                tg.MainButton.color = '#ff1a6d';
                tg.MainButton.textColor = '#ffffff';
                tg.MainButton.show();
                tg.MainButton.onClick(() => tg.close());
            }
            render();
        }

        function navigate(page) {
            appState.currentPage = page;
            render();
        }

        function render() {
            const container = document.getElementById('app');
            if (appState.currentPage === 'home') {
                container.innerHTML = renderHome();
            } else {
                container.innerHTML = renderSubPage(appState.currentPage);
            }
        }

        function renderHome() {
            let cardsHtml = cards.map((c, i) => `
                <div class="glass-card fade-in" style="animation-delay: ${0.1 + i * 0.05}s; --card-hover-border: ${c.color}45; --icon-glow: ${c.color}35;" onclick="navigate('${c.id}')" tabindex="0" role="button">
                    <div class="card-icon" style="background:${c.bg};color:${c.color};">${c.icon}</div>
                    <h3 class="text-[13px] font-semibold" style="color:var(--fg);">${c.title}</h3>
                    <p class="text-[11px] mt-1" style="color:var(--muted);">${c.desc}</p>
                </div>
            `).join('');

            return `
                <header class="mb-2 fade-in">
                    <h1 class="text-[26px] font-extrabold tracking-tight" style="color:var(--fg);">Dashboard</h1>
                    <div class="accent-line"></div>
                </header>
                <p class="text-[13px] mt-3 mb-7 fade-in" style="color:var(--muted); animation-delay: 0.05s;">
                    Welcome back${isTelegram && tg.initDataUnsafe?.user ? ', ' + tg.initDataUnsafe.user.first_name : ''}. Tap a card to explore.
                </p>
                ${!isTelegram ? '<div class="dev-notice mb-5 fade-in">Preview mode — open via Telegram bot for full functionality.</div>' : ''}
                <section aria-label="Categories" class="grid grid-cols-2 gap-3">${cardsHtml}</section>
                
                <section class="mt-7 fade-in" style="animation-delay: 0.6s;">
                    <div class="glass-card glass-card--static">
                        <p class="text-[10px] font-semibold tracking-widest mb-2" style="color: var(--muted); opacity: 0.7;">BACKGROUND EVENT</p>
                        <p class="text-[12px] mb-4 leading-relaxed" style="color: rgba(255,255,255,0.32);">Sends a message to the bot <em>without</em> closing this view.</p>
                        <button class="action-btn" style="background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(139,92,246,0.12)); border-color: rgba(0,229,255,0.2); color: var(--accent);" onclick="sendPing()">Send Background Ping</button>
                    </div>
                </section>
            `;
        }

        function renderSubPage(id) {
            const card = cards.find(c => c.id === id);
            if (!card) return '<p>Not found</p>';

            let contentHtml = '';

            // Специальная логика для раздела Settings (Переключатель)
            if (id === 'settings') {
                const isOn = appState.notifications;
                contentHtml = `
                    <div class="flex items-center justify-between py-4 border-b border-white/5">
                        <div>
                            <p class="text-[14px] font-medium" style="color:var(--fg);">Push Notifications</p>
                            <p class="text-[11px] mt-0.5" style="color:var(--muted);">Toggle to sync state with bot chat</p>
                        </div>
                        <div class="toggle-track ${isOn ? 'active' : ''}" onclick="toggleNotif()" id="notifToggle" role="switch" aria-checked="${isOn}" tabindex="0">
                            <div class="toggle-thumb"></div>
                        </div>
                    </div>
                    <p class="text-[11px] mt-4 text-center" style="color:${isOn ? '#34d399' : 'var(--muted)'};" id="syncStatus">
                        Status: ${isOn ? 'Synchronized (ON)' : 'Synchronized (OFF)'}
                    </p>
                `;
            } 
            // Стандартный контент для других разделов
            else {
                const dummyTexts = {
                    profile: "Manage your public name, avatar, and bio. Changes here will reflect across the entire ecosystem.",
                    wallet: "Your current balance is <strong style='color:#34d399'>1,250.00 TON</strong>. You can withdraw or top up using the methods below.",
                    analytics: "Your engagement increased by 24% this week. Most active time: 18:00 - 21:00 MSK.",
                    notifications: "You have 3 unread alerts. Critical system updates are highlighted in red.",
                    security: "Two-Factor Authentication is currently <strong style='color:#34d399'>Enabled</strong>. Last login: Moscow, Russia.",
                    referrals: "Your referral link: <code style='color:var(--accent); word-break:break-all;'>t.me/yourbot?start=ref_4829</code><br>Total invites: 12",
                    premium: "Upgrade to Premium for unlimited analytics, priority support, and exclusive features."
                };
                contentHtml = `<p class="text-[13px] leading-relaxed" style="color: rgba(255,255,255,0.6);">${dummyTexts[id] || 'Section content goes here.'}</p>`;
            }

            return `
                <div class="fade-in">
                    <button onclick="navigate('home')" class="flex items-center gap-2 text-[13px] font-medium mb-6 bg-transparent border-0 cursor-pointer" style="color:var(--accent);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        Back to Dashboard
                    </button>

                    <div class="flex items-center gap-4 mb-6">
                        <div class="card-icon" style="background:${card.bg};color:${card.color}; width:56px; height:56px; margin:0; cursor:default;">
                            ${card.icon.replace('width="22"', 'width="26"').replace('height="22"', 'height="26"')}
                        </div>
                        <div>
                            <h2 class="text-[22px] font-bold" style="color:var(--fg);">${card.title}</h2>
                            <p class="text-[12px]" style="color:var(--muted);">${card.desc}</p>
                        </div>
                    </div>

                    <div class="sub-content">
                        ${contentHtml}
                    </div>

                    <button class="action-btn mt-6" onclick="sendDataAndClose('${card.id}')">
                        Save & Close App
                    </button>
                    <p class="text-[11px] mt-3 text-center" style="color:var(--muted);">Uses tg.sendData() — closes this view and sends data to bot.</p>
                </div>
            `;
        }

        // --- Логика синхронизации переключателя ---
        async function toggleNotif() {
            const newState = !appState.notifications;
            appState.notifications = newState;
            
            // Обновляем UI сразу для отзывчивости
            document.getElementById('notifToggle').classList.toggle('active', newState);
            document.getElementById('notifToggle').setAttribute('aria-checked', newState);
            document.getElementById('syncStatus').style.color = newState ? '#34d399' : 'var(--muted)';
            document.getElementById('syncStatus').textContent = `Status: Synchronizing...`;

            if (isTelegram && chatId) {
                try {
                    const res = await fetch('/api/event', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: parseInt(chatId),
                            event: 'toggle_notifications',
                            data: { value: newState }
                        })
                    });
                    const data = await res.json();
                    if (data.ok) {
                        document.getElementById('syncStatus').textContent = `Status: Synchronized (${newState ? 'ON' : 'OFF'})`;
                        showToast(`Button turned ${newState ? 'ON' : 'OFF'} in bot chat`);
                    } else {
                        document.getElementById('syncStatus').textContent = 'Sync failed';
                        document.getElementById('syncStatus').style.color = 'var(--accent-2)';
                        appState.notifications = !newState; // откат
                        document.getElementById('notifToggle').classList.toggle('active', !newState);
                    }
                } catch (e) {
                    console.error(e);
                    appState.notifications = !newState; // откат
                    document.getElementById('notifToggle').classList.toggle('active', !newState);
                }
            } else {
                document.getElementById('syncStatus').textContent = `Status: Dev Mode (${newState ? 'ON' : 'OFF'})`;
                console.log('Toggle state:', newState);
            }
        }

        // --- Логика отправки данных (закрывает приложение) ---
        function sendDataAndClose(category) {
            const payload = JSON.stringify({
                category: category,
                action: 'save_and_close',
                timestamp: new Date().toISOString()
            });

            if (isTelegram && tg.sendData) {
                tg.sendData(payload);
            } else {
                console.log('Would sendData:', payload);
                showToast('Data logged to console (dev mode)');
            }
        }

        // --- Фоновый пинг ---
        async function sendPing() {
            if (!chatId) {
                showToast('No chat_id provided');
                return;
            }
            try {
                await fetch('/api/event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: parseInt(chatId),
                        event: 'ping',
                        data: { source: 'mini_app', time: new Date().toISOString() }
                    })
                });
                showToast('Background ping sent!');
            } catch (e) {
                showToast('Failed to send ping');
            }
        }

        // --- Утилиты ---
        var toastTimer = null;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('visible'), 2400);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
